<div class="passcode-prompt">
  <h3>Enter Passcode</h3>
  <p>Enter your passcode to temporarily unlock Shorts</p>
  <input type="password" class="passcode-input" placeholder="Enter passcode" maxlength="20">
  <div class="prompt-buttons">
    <button class="prompt-cancel">Cancel</button>
    <button class="prompt-submit">Unlock</button>
  </div>
  <p class="error-message" style="display: none;">Incorrect passcode</p>
</div>
