<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YouTube Shorts Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h2>YouTube Shorts Blocker</h2>

    <div class="status-card">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="status-text">Shorts Blocked</span>
      </div>
    </div>

    <div class="control-buttons">
      <button id="toggle-btn" class="toggle-btn">
        <span id="toggle-text">Disable Blocking</span>
      </button>
    </div>

    <div class="info-section">
      <p>YouTube Shorts are currently being blocked to help reduce short-form video addiction.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
